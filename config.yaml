# ─────────────────────────────────────────────
# LLM Debate Pipeline — Configuration
# ─────────────────────────────────────────────

models:
  # Model name strings must match exactly what the vLLM server was launched with.
  # Verify by running: curl http://<host>/v1/models with your API key.
  debater_a: "meta-llama/Llama-3.1-8B-Instruct"
  debater_b: "Qwen/Qwen3-8B"
  judge:     "Llama-3.1-70B-Instruct-custom"        # confirmed from instructor
  baseline:  "Llama-3.1-70B-Instruct-custom"        # same server as judge

api:
  # Base URLs and keys are loaded from .env — do not hardcode here.
  # See .env.example for the expected variable names.
  debater_a_url_env: "API_BASE_URL_DEBATER_A"
  debater_a_key_env: "API_KEY_DEBATER_A"
  debater_b_url_env: "API_BASE_URL_DEBATER_B"
  debater_b_key_env: "API_KEY_DEBATER_B"
  judge_url_env:     "API_BASE_URL_JUDGE"
  judge_key_env:     "API_KEY_JUDGE"

generation:
  temperature: 0.7
  max_tokens: 1024
  judge_max_tokens: 2048     # judge needs more tokens for 5-section structured output
  baseline_max_tokens: 2048  # baselines need room to finish CoT before FINAL ANSWER
  top_p: 0.95

debate:
  max_rounds: 5           # maximum number of debate rounds (N >= 3)
  min_rounds: 3           # minimum rounds before early stopping is allowed
  early_stop_consecutive: 2  # stop if both agents agree for this many consecutive rounds

dataset:
  name: "ARC-Challenge"
  split: "test"
  num_questions: 200      # number of questions to evaluate
  data_dir: "data/"

self_consistency:
  # N must match total LLM calls in a full debate for a fair comparison:
  # 2 (initial positions) + 2 x max_rounds (debate) + 1 (judge) = 13
  num_samples: 13         # number of samples for majority vote baseline

logging:
  log_dir: "logs/"
  results_dir: "results/"
